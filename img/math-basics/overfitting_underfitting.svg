<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" font-family="Arial, sans-serif">
  <rect width="800" height="320" fill="#f8f9fa" rx="8"/>

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#212529">过拟合与欠拟合对比</text>

  <!-- === Panel 1: Underfitting === -->
  <rect x="20" y="42" width="235" height="250" rx="6" fill="white" stroke="#dee2e6" stroke-width="1"/>
  <text x="137" y="62" text-anchor="middle" font-size="13" font-weight="bold" fill="#e03131">欠拟合（Underfitting）</text>
  <text x="137" y="78" text-anchor="middle" font-size="10" fill="#868e96">模型过于简单</text>
  <!-- Axes -->
  <line x1="45" y1="268" x2="235" y2="268" stroke="#adb5bd" stroke-width="1"/>
  <line x1="45" y1="90" x2="45" y2="268" stroke="#adb5bd" stroke-width="1"/>
  <!-- Data points (curve pattern) -->
  <circle cx="55" cy="240" r="3.5" fill="#4c6ef5" opacity="0.7"/>
  <circle cx="70" cy="220" r="3.5" fill="#4c6ef5" opacity="0.7"/>
  <circle cx="85" cy="195" r="3.5" fill="#4c6ef5" opacity="0.7"/>
  <circle cx="100" cy="175" r="3.5" fill="#4c6ef5" opacity="0.7"/>
  <circle cx="115" cy="145" r="3.5" fill="#4c6ef5" opacity="0.7"/>
  <circle cx="130" cy="160" r="3.5" fill="#4c6ef5" opacity="0.7"/>
  <circle cx="145" cy="135" r="3.5" fill="#4c6ef5" opacity="0.7"/>
  <circle cx="160" cy="150" r="3.5" fill="#4c6ef5" opacity="0.7"/>
  <circle cx="175" cy="130" r="3.5" fill="#4c6ef5" opacity="0.7"/>
  <circle cx="190" cy="145" r="3.5" fill="#4c6ef5" opacity="0.7"/>
  <circle cx="205" cy="125" r="3.5" fill="#4c6ef5" opacity="0.7"/>
  <circle cx="220" cy="115" r="3.5" fill="#4c6ef5" opacity="0.7"/>
  <!-- Underfitting line (flat/linear, misses the curve) -->
  <line x1="50" y1="255" x2="230" y2="115" stroke="#e03131" stroke-width="2.5" stroke-dasharray="5,3"/>
  <!-- Labels -->
  <text x="50" y="278" font-size="9" fill="#868e96">训练数据</text>
  <circle cx="42" cy="278" r="3" fill="#4c6ef5" opacity="0.7"/>
  <text x="120" y="278" font-size="9" fill="#868e96">模型预测</text>
  <line x1="105" y1="275" x2="118" y2="275" stroke="#e03131" stroke-width="2" stroke-dasharray="5,3"/>

  <!-- === Panel 2: Good Fit === -->
  <rect x="282" y="42" width="235" height="250" rx="6" fill="white" stroke="#2b8a3e" stroke-width="1.5"/>
  <text x="400" y="62" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b8a3e">合适拟合（Good Fit）</text>
  <text x="400" y="78" text-anchor="middle" font-size="10" fill="#868e96">模型复杂度适中</text>
  <line x1="307" y1="268" x2="497" y2="268" stroke="#adb5bd" stroke-width="1"/>
  <line x1="307" y1="90" x2="307" y2="268" stroke="#adb5bd" stroke-width="1"/>
  <!-- Data points -->
  <circle cx="317" cy="240" r="3.5" fill="#4c6ef5" opacity="0.7"/>
  <circle cx="332" cy="220" r="3.5" fill="#4c6ef5" opacity="0.7"/>
  <circle cx="347" cy="195" r="3.5" fill="#4c6ef5" opacity="0.7"/>
  <circle cx="362" cy="175" r="3.5" fill="#4c6ef5" opacity="0.7"/>
  <circle cx="377" cy="145" r="3.5" fill="#4c6ef5" opacity="0.7"/>
  <circle cx="392" cy="160" r="3.5" fill="#4c6ef5" opacity="0.7"/>
  <circle cx="407" cy="135" r="3.5" fill="#4c6ef5" opacity="0.7"/>
  <circle cx="422" cy="150" r="3.5" fill="#4c6ef5" opacity="0.7"/>
  <circle cx="437" cy="130" r="3.5" fill="#4c6ef5" opacity="0.7"/>
  <circle cx="452" cy="145" r="3.5" fill="#4c6ef5" opacity="0.7"/>
  <circle cx="467" cy="125" r="3.5" fill="#4c6ef5" opacity="0.7"/>
  <circle cx="482" cy="115" r="3.5" fill="#4c6ef5" opacity="0.7"/>
  <!-- Good fit curve -->
  <path d="M312,248 C332,210 350,180 365,165 C380,150 395,155 410,140 C425,125 445,135 460,128 C475,120 485,118 495,110" fill="none" stroke="#2b8a3e" stroke-width="2.5"/>

  <!-- === Panel 3: Overfitting === -->
  <rect x="545" y="42" width="235" height="250" rx="6" fill="white" stroke="#e03131" stroke-width="1"/>
  <text x="662" y="62" text-anchor="middle" font-size="13" font-weight="bold" fill="#e03131">过拟合（Overfitting）</text>
  <text x="662" y="78" text-anchor="middle" font-size="10" fill="#868e96">模型过于复杂</text>
  <line x1="570" y1="268" x2="760" y2="268" stroke="#adb5bd" stroke-width="1"/>
  <line x1="570" y1="90" x2="570" y2="268" stroke="#adb5bd" stroke-width="1"/>
  <!-- Data points -->
  <circle cx="580" cy="240" r="3.5" fill="#4c6ef5" opacity="0.7"/>
  <circle cx="595" cy="220" r="3.5" fill="#4c6ef5" opacity="0.7"/>
  <circle cx="610" cy="195" r="3.5" fill="#4c6ef5" opacity="0.7"/>
  <circle cx="625" cy="175" r="3.5" fill="#4c6ef5" opacity="0.7"/>
  <circle cx="640" cy="145" r="3.5" fill="#4c6ef5" opacity="0.7"/>
  <circle cx="655" cy="160" r="3.5" fill="#4c6ef5" opacity="0.7"/>
  <circle cx="670" cy="135" r="3.5" fill="#4c6ef5" opacity="0.7"/>
  <circle cx="685" cy="150" r="3.5" fill="#4c6ef5" opacity="0.7"/>
  <circle cx="700" cy="130" r="3.5" fill="#4c6ef5" opacity="0.7"/>
  <circle cx="715" cy="145" r="3.5" fill="#4c6ef5" opacity="0.7"/>
  <circle cx="730" cy="125" r="3.5" fill="#4c6ef5" opacity="0.7"/>
  <circle cx="745" cy="115" r="3.5" fill="#4c6ef5" opacity="0.7"/>
  <!-- Overfitting curve (wiggly, passes through every point) -->
  <path d="M575,248 C582,235 588,225 595,220 C602,215 605,200 610,195 C615,190 620,180 625,175 C630,170 635,155 640,145 C645,155 650,165 655,160 C660,155 665,140 670,135 C675,145 680,155 685,150 C690,145 695,135 700,130 C705,140 710,150 715,145 C720,135 725,128 730,125 C735,120 740,118 750,112" fill="none" stroke="#e03131" stroke-width="2.5"/>

  <!-- Annotation -->
  <text x="662" y="286" text-anchor="middle" font-size="10" fill="#868e96">记住每个数据点的噪音</text>
</svg>